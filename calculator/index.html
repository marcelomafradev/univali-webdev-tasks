<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Calculadora</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="calc-wrapper">
      <div class="calculator">
        <div class="display">
          <span class="display-expression" id="expression"></span>
          <span class="display-result" id="result">0</span>
        </div>

        <div class="buttons">
          <button class="btn btn-clear" onclick="clearAll()">AC</button>
          <button class="btn btn-clear" onclick="clearEntry()">CE</button>
          <button class="btn btn-operator" onclick="appendToExpression('%')">
            %
          </button>
          <button class="btn btn-operator" onclick="appendToExpression('/')">
            ÷
          </button>

          <button class="btn btn-number" onclick="appendToExpression('7')">
            7
          </button>
          <button class="btn btn-number" onclick="appendToExpression('8')">
            8b
          </button>
          <button class="btn btn-number" onclick="appendToExpression('9')">
            9
          </button>
          <button class="btn btn-operator" onclick="appendToExpression('*')">
            ×
          </button>

          <button class="btn btn-number" onclick="appendToExpression('4')">
            4
          </button>
          <button class="btn btn-number" onclick="appendToExpression('5')">
            5
          </button>
          <button class="btn btn-number" onclick="appendToExpression('6')">
            6
          </button>
          <button class="btn btn-operator" onclick="appendToExpression('-')">
            −
          </button>

          <button class="btn btn-number" onclick="appendToExpression('1')">
            1
          </button>
          <button class="btn btn-number" onclick="appendToExpression('2')">
            2
          </button>
          <button class="btn btn-number" onclick="appendToExpression('3')">
            3
          </button>
          <button class="btn btn-operator" onclick="appendToExpression('+')">
            +
          </button>

          <button
            class="btn btn-number btn-zero"
            onclick="appendToExpression('0')"
          >
            0
          </button>
          <button class="btn btn-number" onclick="appendToExpression('.')">
            .
          </button>
          <button class="btn btn-equals" onclick="calculate()">=</button>
        </div>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
